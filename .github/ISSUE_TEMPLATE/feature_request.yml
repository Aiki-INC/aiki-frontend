name: Feature request
description: Suggest a new feature or improvement for Aiki
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What feature should be added?
      placeholder: Describe the feature clearly.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List clear conditions that must be true when this is complete.
      placeholder: |
        - [ ] The feature does ...
        - [ ] The UI shows ...
        - [ ] The implementation passes lint/type-check/build.
    validations:
      required: true
  - type: dropdown
    id: difficulty
    attributes:
      label: Suggested difficulty
      options:
        - Trivial
        - Medium
        - High
        - Not sure
